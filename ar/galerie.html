<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض الصور - إسكومود</title>
    <meta name="description" content="اكتشف إبداعات طلابنا وعروض الأزياء السنوية في مدرسة إسكومود.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">

    <style>
        body { font-family: 'Cairo', sans-serif; }
        h1, h2, h3, h4, h5, h6, .logo { font-family: 'Amiri', serif; }

        .page-header {
            padding: 120px 0 60px;
            background-color: var(--color-text);
            color: var(--color-white);
            text-align: center;
        }
        .page-header h1 {
            color: var(--color-white);
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .gallery-filter {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 3rem 0;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: none;
            border: 1px solid var(--color-grey-dark);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-family: var(--font-body);
            transition: all var(--transition-fast);
        }
        .filter-btn.active, .filter-btn:hover {
            background-color: var(--color-primary);
            color: var(--color-white);
            border-color: var(--color-primary);
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            padding-bottom: 5rem;
        }
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            aspect-ratio: 4/5;
            background-color: #eee;
            cursor: pointer;
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform var(--transition-slow);
        }
        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(128, 0, 32, 0.8);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity var(--transition-normal);
        }
        .gallery-item:hover img {
            transform: scale(1.1);
        }
        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }
        
        /* Lightbox RTL fix */
        .lightbox-close {
            left: 40px;
            right: auto;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar" style="background-color: var(--color-white);">
        <div class="container">
            <a href="index.html" class="logo">إسكومود</a>
            <div class="nav-links">
                <a href="index.html">الرئيسية</a>
                <a href="formations.html">تكويناتنا</a>
                <a href="galerie.html" class="active">المعرض</a>
                <a href="temoignages.html">آراء الطلاب</a>
                <a href="a-propos.html">من نحن</a>
                <a href="contact.html">اتصل بنا</a>
                <a href="../galerie.html" class="lang-switch">Français</a>
            </div>
            <div class="menu-toggle"><i class="fas fa-bars"></i></div>
        </div>
    </nav>

    <!-- Header -->
    <header class="page-header">
        <div class="container">
            <h1>المعرض والإبداعات</h1>
            <p>تسليط الضوء على إبداعات وابتكارات طلابنا.</p>
        </div>
    </header>

    <div class="container">
        <!-- Filtres -->
        <div class="gallery-filter">
            <button class="filter-btn active" data-filter="all">الكل</button>
            <button class="filter-btn" data-filter="haute_couture">خياطة رفيعة</button>
            <button class="filter-btn" data-filter="pret_a_porter">ملابس جاهزة</button>

        </div>

        <!-- Grille -->
        <div class="gallery-grid" id="gallery-grid">
            <!-- Injecté dynamiquement par JS -->
        </div>
    </div>

    <!-- Lightbox Modal -->
    <div id="gallery-lightbox" class="lightbox">
        <span class="lightbox-close">&times;</span>
        <div class="lightbox-content">
            <img id="lightbox-img" src="" alt="">
            <video id="lightbox-video" controls autoplay muted playsinline></video>
            <div id="lightbox-caption"></div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 إسكومود. جميع الحقوق محفوظة.</p>
            </div>
        </div>
    </footer>

    <!-- WhatsApp Floating Button -->
    <a href="https://wa.me/212600000000" class="whatsapp-float" target="_blank" rel="noopener noreferrer">
        <i class="fab fa-whatsapp"></i>
    </a>

    <!-- Custom scripts -->
    <script src="../js/gallery.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const galleryGrid = document.getElementById('gallery-grid');
            const filterBtns = document.querySelectorAll('.filter-btn');
            
            // Lightbox Elements
            const lightbox = document.getElementById('gallery-lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const lightboxVideo = document.getElementById('lightbox-video');
            const lightboxCaption = document.getElementById('lightbox-caption');
            const lightboxClose = document.querySelector('.lightbox-close');

            // Load Gallery Items
            const items = getGalleryItems();

            function renderGallery(filter = 'all') {
                galleryGrid.innerHTML = '';
                
                const filteredItems = filter === 'all' 
                    ? items 
                    : items.filter(item => item.category === filter);

                if (filteredItems.length === 0) {
                    galleryGrid.innerHTML = '<p style="text-align: center; grid-column: 1/-1; padding: 3rem 0; color: var(--color-grey-dark);">لا يوجد أي محتوى في هذا القسم حالياً.</p>';
                    return;
                }

                filteredItems.forEach(item => {
                    const galleryItem = document.createElement('div');
                    galleryItem.className = 'gallery-item';
                    
                    const isVideo = item.type === 'video';
                    const iconClass = isVideo ? 'fas fa-play' : 'fas fa-search-plus';
                    
                    const mediaSrc = item.url;
                    
                    // Fallback path helper since we are inside ar/ folder
                    let finalUrl = mediaSrc;
                    if (!mediaSrc.startsWith('http') && !mediaSrc.startsWith('https')) {
                        finalUrl = '../' + mediaSrc;
                    }

                    let imageTag = '';
                    if (isVideo) {
                        // Card look for video
                        imageTag = `<div style="width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, #2c000a, #4a0014); color: white; aspect-ratio: 4/5;">
                                        <i class="fas fa-play-circle" style="font-size: 4rem; color: var(--color-secondary); margin-bottom: 1rem; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));"></i>
                                        <span style="font-size: 0.95rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 500; color: #eee;">فيديو</span>
                                    </div>`;
                    } else {
                        imageTag = `<img src="${finalUrl}" alt="${item.title_ar || item.title_fr}" onerror="this.src='https://via.placeholder.com/600x750?text=Image+indisponible'">`;
                    }

                    const displayTitle = item.title_ar || item.title_fr;
                    const displayDesc = item.desc_ar || item.desc_fr;

                    galleryItem.innerHTML = `
                        ${imageTag}
                        <div class="gallery-overlay">
                            <i class="${iconClass}"></i>
                            <h3>${displayTitle}</h3>
                            <p>${displayDesc}</p>
                        </div>
                    `;

                    galleryItem.addEventListener('click', () => {
                        openLightbox(item);
                    });

                    galleryGrid.appendChild(galleryItem);
                });
            }

            function openLightbox(item) {
                lightboxImg.style.display = 'none';
                lightboxVideo.style.display = 'none';
                lightboxVideo.pause();
                lightboxVideo.src = '';
                
                const displayTitle = item.title_ar || item.title_fr;
                const displayDesc = item.desc_ar || item.desc_fr;
                lightboxCaption.textContent = displayTitle + (displayDesc ? ` - ${displayDesc}` : '');

                const mediaSrc = item.url;
                let finalUrl = mediaSrc;
                if (!mediaSrc.startsWith('http') && !mediaSrc.startsWith('https')) {
                    finalUrl = '../' + mediaSrc;
                }

                if (item.type === 'video') {
                    lightboxVideo.src = finalUrl;
                    lightboxVideo.style.display = 'block';
                    lightboxVideo.load();
                    lightboxVideo.play().catch(e => console.log("Auto-play prevented", e));
                } else {
                    lightboxImg.src = finalUrl;
                    lightboxImg.style.display = 'block';
                }

                lightbox.classList.add('active');
            }

            function closeLightbox() {
                lightbox.classList.remove('active');
                lightboxVideo.pause();
                lightboxVideo.src = '';
            }

            lightboxClose.addEventListener('click', closeLightbox);
            
            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) {
                    closeLightbox();
                }
            });

            // ESC key to close lightbox
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    closeLightbox();
                }
            });

            filterBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const filterValue = btn.getAttribute('data-filter');
                    renderGallery(filterValue);
                });
            });

            // Init
            renderGallery();
        });
    </script>
    <script src="../js/main.js"></script>
</body>
</html>
